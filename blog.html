<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Olga Kalinina</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .blog-page { padding: 60px 0 100px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 40px; }
    .filter-tag { padding: 5px 14px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--light-gray); background: white; color: var(--dark); transition: all 0.2s; white-space: nowrap; }
    .filter-tag:hover { border-color: var(--dark); }
    .filter-tag.active { background: var(--dark); color: white; border-color: var(--dark); }
    .blog-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }
    .blog-card { border: 2px solid var(--light-gray); border-radius: var(--radius-card); padding: 20px 20px 24px; display: flex; flex-direction: column; gap: 14px; cursor: pointer; transition: all 0.2s; text-decoration: none; color: inherit; }
    .blog-card:hover { border-color: var(--dark); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    /* FIX: tags are fit-content, not stretched */
    .blog-tag { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 500; width: fit-content; white-space: nowrap; }
    .blog-card-title { font-size: 20px; font-weight: 500; color: var(--dark); line-height: 1.3; }
    .blog-card-excerpt { font-size: 15px; color: var(--gray); line-height: 1.6; flex: 1; }
    .blog-card-date { font-size: 13px; color: var(--gray); }
    @media (max-width: 1024px) { .blog-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 600px) { .blog-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <script>
    document.getElementById('filterRow').addEventListener('click',function(e){
      const btn=e.target.closest('.filter-tag');if(!btn)return;
      document.querySelectorAll('.filter-tag').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const f=btn.dataset.filter;
      document.querySelectorAll('.blog-card').forEach(c=>{c.style.display=(f==='all'||c.dataset.category===f)?'':'none';});
    });
  </script>
  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('menuBackdrop').classList.toggle('open');
    }
  </script>
