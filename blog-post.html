  <style>
    .post-wrap { max-width: 720px; margin: 0 auto; padding: 60px 0 100px; }
    .post-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 40px; }
    .post-meta { display: flex; flex-direction: column; gap: 10px; }
    .post-title { font-size: 40px; font-weight: 600; color: var(--dark); line-height: 1.2; }
    .post-date { font-size: 15px; color: var(--gray); }
    .share-btn { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--light-gray); background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 6px; transition: border-color 0.2s; }
    .share-btn:hover { border-color: var(--dark); }
    .share-btn svg { width: 18px; height: 18px; }
    .post-body { display: flex; flex-direction: column; gap: 28px; }
    .post-body p { font-size: 17px; color: var(--dark); line-height: 1.75; }
    .post-img { width: 100%; border-radius: 16px; overflow: hidden; }
    .post-img img { width: 100%; height: 320px; object-fit: cover; }
    .post-img-caption { font-size: 13px; color: var(--gray); text-align: center; margin-top: 8px; }
  </style>
